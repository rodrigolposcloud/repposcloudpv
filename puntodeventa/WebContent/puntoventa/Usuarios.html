<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Usuarios - Punto de Venta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.card { border-radius:10px; }
input, select { font-size:1.05rem; }
</style>

<script>
// ================== CATÁLOGOS SIMULADOS ==================
let empresas = [
    {id:1, nombre:"Empresa Demo"},
    {id:2, nombre:"Abarrotes San Juan"}
];

let roles = [
    {id:1, nombre:"ADMINISTRADOR"},
    {id:2, nombre:"CAJERO"},
    {id:3, nombre:"ANALISTA"},
    {id:4, nombre:"REPARTIDOR"}
];

// ================== USUARIOS ==================
let usuarios = [];
let idUsuario = 1;

// ================== CARGAR LISTAS ==================
function cargarCombos(){
    empresas.forEach(e=>{
        empresa.innerHTML += `<option value="${e.id}">${e.nombre}</option>`;
    });

    roles.forEach(r=>{
        rol.innerHTML += `<option value="${r.id}">${r.nombre}</option>`;
    });
}

// ================== GUARDAR USUARIO ==================
function guardarUsuario(){
    let usuario = {
        id: idUsuario++,
        empresa: empresa.options[empresa.selectedIndex].text,
        rol: rol.options[rol.selectedIndex].text,
        nombre: nombre.value,
        login: login.value,
        estatus: estatus.value
    };

    usuarios.push(usuario);
    listarUsuarios();
    limpiar();
}

// ================== LISTAR ==================
function listarUsuarios(){
    tablaUsuarios.innerHTML = "";

    usuarios.forEach(u=>{
        let fila = tablaUsuarios.insertRow();
        fila.insertCell(0).innerText = u.id;
        fila.insertCell(1).innerText = u.empresa;
        fila.insertCell(2).innerText = u.rol;
        fila.insertCell(3).innerText = u.nombre;
        fila.insertCell(4).innerText = u.login;
        fila.insertCell(5).innerHTML =
            u.estatus === "H"
            ? "<span class='badge bg-success'>Habilitado</span>"
            : "<span class='badge bg-danger'>Bloqueado</span>";
    });
}

// ================== LIMPIAR ==================
function limpiar(){
    nombre.value="";
    login.value="";
    password.value="";
    estatus.value="H";
}
</script>
</head>

<body onload="cargarCombos()">

<div class="container-fluid mt-4">
<div class="row">

<!-- FORMULARIO -->
<div class="col-md-4">
<div class="card shadow mb-3">
<div class="card-header bg-primary text-white">
<h4>Usuario</h4>
</div>

<div class="card-body">
<label>Empresa</label>
<select id="empresa" class="form-control mb-2"></select>

<label>Rol</label>
<select id="rol" class="form-control mb-2"></select>

<label>Nombre completo</label>
<input id="nombre" class="form-control mb-2">

<label>Usuario / Login</label>
<input id="login" class="form-control mb-2">

<label>Contraseña</label>
<input id="password" type="password" class="form-control mb-2">

<label>Estatus</label>
<select id="estatus" class="form-control mb-3">
<option value="H">Habilitado</option>
<option value="B">Bloqueado</option>
</select>

<button class="btn btn-success w-100" onclick="guardarUsuario()">
Guardar Usuario
</button>
</div>
</div>
</div>

<!-- LISTADO -->
<div class="col-md-8">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4>Usuarios Registrados</h4>
</div>

<div class="card-body p-0">
<table class="table table-striped table-bordered mb-0">
<thead class="table-light">
<tr>
<th>ID</th>
<th>Empresa</th>
<th>Rol</th>
<th>Nombre</th>
<th>Login</th>
<th>Estatus</th>
</tr>
</thead>
<tbody id="tablaUsuarios"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- AVISO LEGAL -->
<footer class="text-center mt-4 text-muted">
<small>
© 2026 – Sistema Punto de Venta desarrollado por Rodrigo.  
Gestión de usuarios, empresas y roles.
</small>
</footer>

</body>
</html>
