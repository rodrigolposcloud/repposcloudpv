<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Empresas - Punto de Venta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.card { border-radius:10px; }
input, textarea, select { font-size:1.05rem; }
</style>

<script>
// ================= EMPRESAS (SIMULACIÓN BD) =================
let empresas = [];
let idEmpresa = 1;

// ================= GUARDAR EMPRESA =================
function guardarEmpresa(){
    let empresa = {
        id: idEmpresa++,
        nombre: nombreEmpresa.value,
        razon: razonSocial.value,
        telefono: telefono.value,
        rfc: rfc.value,
        domicilio: domicilio.value,
        estatus: estatus.value
    };

    empresas.push(empresa);
    listarEmpresas();
    limpiarFormulario();
}

// ================= LISTAR EMPRESAS =================
function listarEmpresas(){
    let tabla = document.getElementById("tablaEmpresas");
    tabla.innerHTML = "";

    empresas.forEach(e => {
        let fila = tabla.insertRow();
        fila.insertCell(0).innerText = e.id;
        fila.insertCell(1).innerText = e.nombre;
        fila.insertCell(2).innerText = e.razon;
        fila.insertCell(3).innerText = e.telefono;
        fila.insertCell(4).innerText = e.rfc;
        fila.insertCell(5).innerText = e.domicilio;
        fila.insertCell(6).innerHTML =
            e.estatus === "H"
            ? "<span class='badge bg-success'>Habilitada</span>"
            : "<span class='badge bg-secondary'>Deshabilitada</span>";
    });
}

// ================= LIMPIAR =================
function limpiarFormulario(){
    nombreEmpresa.value = "";
    razonSocial.value = "";
    telefono.value = "";
    rfc.value = "";
    domicilio.value = "";
    estatus.value = "H";
}
</script>
</head>

<body>

<div class="container-fluid mt-4">
<div class="row">

<!-- FORMULARIO -->
<div class="col-md-4">
<div class="card shadow mb-3">
<div class="card-header bg-primary text-white">
<h4>Empresa</h4>
</div>

<div class="card-body">
<label>Nombre de la empresa</label>
<input id="nombreEmpresa" class="form-control mb-2">

<label>Razón social</label>
<input id="razonSocial" class="form-control mb-2">

<label>Teléfono</label>
<input id="telefono" class="form-control mb-2">

<label>RFC</label>
<input id="rfc" class="form-control mb-2">

<label>Domicilio</label>
<textarea id="domicilio" class="form-control mb-2" rows="2"></textarea>

<label>Estatus</label>
<select id="estatus" class="form-control mb-3">
<option value="H">Habilitada</option>
<option value="D">Deshabilitada</option>
</select>

<button class="btn btn-success w-100" onclick="guardarEmpresa()">
Guardar Empresa
</button>
</div>
</div>
</div>

<!-- LISTADO -->
<div class="col-md-8">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4>Empresas Registradas</h4>
</div>

<div class="card-body p-0">
<table class="table table-striped table-bordered mb-0">
<thead class="table-light">
<tr>
<th>ID</th>
<th>Empresa</th>
<th>Razón Social</th>
<th>Teléfono</th>
<th>RFC</th>
<th>Domicilio</th>
<th>Estatus</th>
</tr>
</thead>
<tbody id="tablaEmpresas"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- AVISO LEGAL -->
<footer class="text-center mt-4 text-muted">
<small>
© 2026 – Sistema Punto de Venta desarrollado por Rodrigo.  
Catálogo de empresas para uso multi-cliente.
</small>
</footer>

</body>
</html>
