<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Submenú - Punto de Venta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.card { border-radius:10px; }
input, select { font-size:1.05rem; }
</style>

<script>
// ================= MENÚS PADRE (SIMULACIÓN BD) =================
const menusPadre = [
  { id:1, nombre:"Ventas" },
  { id:2, nombre:"Clientes" },
  { id:3, nombre:"Productos" },
  { id:4, nombre:"Configuración" }
];

// ================= SUBMENÚS =================
let submenus = [];
let idSubmenu = 1;

// ================= GUARDAR SUBMENÚ =================
function guardarSubmenu(){
    let submenu = {
        id: idSubmenu++,
        menuPadre: menuPadre.value,
        nombre: nombreSubmenu.value,
        url: url.value,
        orden: orden.value,
        estatus: estatus.value
    };

    submenus.push(submenu);
    listarSubmenus();
    limpiarFormulario();
}

// ================= LISTAR =================
function listarSubmenus(){
    let tabla = document.getElementById("tablaSubmenus");
    tabla.innerHTML = "";

    // Ordenar por menú y orden
    submenus.sort((a,b) => a.menuPadre - b.menuPadre || a.orden - b.orden);

    submenus.forEach(s => {
        let fila = tabla.insertRow();
        fila.insertCell(0).innerText = s.id;
        fila.insertCell(1).innerText = nombreMenu(s.menuPadre);
        fila.insertCell(2).innerText = s.nombre;
        fila.insertCell(3).innerText = s.url;
        fila.insertCell(4).innerText = s.orden;
        fila.insertCell(5).innerHTML =
            s.estatus === "H"
            ? "<span class='badge bg-success'>Habilitado</span>"
            : "<span class='badge bg-secondary'>Deshabilitado</span>";
    });
}

// ================= OBTENER NOMBRE MENÚ =================
function nombreMenu(id){
    let m = menusPadre.find(x => x.id == id);
    return m ? m.nombre : "N/D";
}

// ================= LIMPIAR =================
function limpiarFormulario(){
    menuPadre.value="";
    nombreSubmenu.value="";
    url.value="";
    orden.value="";
    estatus.value="H";
}
</script>
</head>

<body>

<div class="container-fluid mt-4">
<div class="row">

<!-- FORMULARIO -->
<div class="col-md-4">
<div class="card shadow mb-3">
<div class="card-header bg-primary text-white">
<h4>Submenú</h4>
</div>

<div class="card-body">
<label>Menú padre</label>
<select id="menuPadre" class="form-control mb-2">
<option value="">Seleccione</option>
<script>
menusPadre.forEach(m=>{
 document.write(`<option value="${m.id}">${m.nombre}</option>`);
});
</script>
</select>

<label>Nombre del submenú</label>
<input id="nombreSubmenu" class="form-control mb-2">

<label>URL</label>
<input id="url" class="form-control mb-2"
placeholder="Ej. ventas.jsp">

<label>Orden</label>
<input id="orden" type="number" class="form-control mb-2">

<label>Estatus</label>
<select id="estatus" class="form-control mb-3">
<option value="H">Habilitado</option>
<option value="D">Deshabilitado</option>
</select>

<button class="btn btn-success w-100" onclick="guardarSubmenu()">
Guardar Submenú
</button>
</div>
</div>
</div>

<!-- LISTADO -->
<div class="col-md-8">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4>Submenús Registrados</h4>
</div>

<div class="card-body p-0">
<table class="table table-striped table-bordered mb-0">
<thead class="table-light">
<tr>
<th>ID</th>
<th>Menú</th>
<th>Submenú</th>
<th>URL</th>
<th>Orden</th>
<th>Estatus</th>
</tr>
</thead>
<tbody id="tablaSubmenus"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- AVISO LEGAL -->
<footer class="text-center mt-4 text-muted">
<small>
© 2026 – Sistema Punto de Venta desarrollado por Rodrigo.  
Administración de navegación del sistema.
</small>
</footer>

</body>
</html>
