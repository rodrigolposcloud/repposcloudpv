<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Punto de Venta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#f4f6f9;
}
.card {
    border-radius:12px;
}
.menu-item {
    padding:10px;
    border-bottom:1px solid #ddd;
}
.menu-item strong {
    display:block;
}
.submenu {
    padding-left:20px;
    font-size:0.95rem;
}
</style>

<script>
// ================== DATOS SIMULADOS ==================
let usuarios = [
    {login:"admin", pass:"123", rol:"ADMINISTRADOR", estatus:"H"},
    {login:"caja", pass:"123", rol:"CAJERO", estatus:"H"},
    {login:"reparto", pass:"123", rol:"REPARTIDOR", estatus:"H"}
];

let permisos = {
    "ADMINISTRADOR": [
        {menu:"Ventas", sub:["Nueva Venta","Historial"]},
        {menu:"Productos", sub:["Catálogo","Inventario"]},
        {menu:"Clientes", sub:["Clientes"]},
        {menu:"Configuración", sub:["Usuarios","Roles"]}
    ],
    "CAJERO": [
        {menu:"Ventas", sub:["Nueva Venta"]},
        {menu:"Clientes", sub:["Clientes"]}
    ],
    "REPARTIDOR": [
        {menu:"Ventas", sub:["Entregas"]}
    ]
};

// ================== LOGIN ==================
function login(){
    let u = usuario.value;
    let p = password.value;

    let encontrado = usuarios.find(x=>x.login===u && x.pass===p);

    if(!encontrado){
        alert("Usuario o contraseña incorrectos");
        return;
    }

    if(encontrado.estatus!=="H"){
        alert("Usuario bloqueado");
        return;
    }

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    document.getElementById("nombreUsuario").innerText =
        u + " (" + encontrado.rol + ")";

    cargarMenu(encontrado.rol);
}

// ================== CARGAR MENÚ ==================
function cargarMenu(rol){
    let cont = document.getElementById("menu");
    cont.innerHTML="";

    permisos[rol].forEach(m=>{
        let bloque = `<div class="menu-item">
            <strong>${m.menu}</strong>`;

        m.sub.forEach(s=>{
            bloque += `<div class="submenu">• ${s}</div>`;
        });

        bloque += `</div>`;
        cont.innerHTML += bloque;
    });
}
</script>
</head>

<body>

<!-- LOGIN -->
<div class="container mt-5" id="loginBox">
<div class="row justify-content-center">
<div class="col-md-4">
<div class="card shadow">
<div class="card-header bg-primary text-white text-center">
<h4>Ingreso al Sistema</h4>
</div>
<div class="card-body">
<label>Usuario</label>
<input id="usuario" class="form-control mb-2">

<label>Contraseña</label>
<input id="password" type="password" class="form-control mb-3">

<button class="btn btn-success w-100" onclick="login()">
Ingresar
</button>
</div>
</div>
</div>
</div>
</div>

<!-- DASHBOARD -->
<div class="container mt-4" id="dashboard" style="display:none">
<div class="row">
<div class="col-md-3">
<div class="card shadow">
<div class="card-header bg-dark text-white">
Menú
</div>
<div class="card-body p-0" id="menu"></div>
</div>
</div>

<div class="col-md-9">
<div class="card shadow">
<div class="card-header bg-primary text-white">
Bienvenido <span id="nombreUsuario"></span>
</div>
<div class="card-body">
<h5>Sistema Punto de Venta</h5>
<p>Seleccione una opción del menú para comenzar.</p>
</div>
</div>
</div>
</div>
</div>

<footer class="text-center mt-4 text-muted">
<small>
© 2026 – Sistema Punto de Venta desarrollado por Rodrigo.  
Acceso controlado por rol y permisos.
</small>
</footer>

</body>
</html>
