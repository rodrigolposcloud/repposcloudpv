<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Menú - Punto de Venta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.card { border-radius:10px; }
input, select { font-size:1.05rem; }
</style>

<script>
// ================= MENÚS (SIMULACIÓN BD) =================
let menus = [];
let idMenu = 1;

// ================= GUARDAR MENÚ =================
function guardarMenu(){
    let menu = {
        id: idMenu++,
        nombre: nombreMenu.value,
        orden: orden.value,
        estatus: estatus.value
    };

    menus.push(menu);
    listarMenus();
    limpiarFormulario();
}

// ================= LISTAR MENÚS =================
function listarMenus(){
    let tabla = document.getElementById("tablaMenus");
    tabla.innerHTML = "";

    // Ordenar por ORDEN
    menus.sort((a,b) => a.orden - b.orden);

    menus.forEach(m => {
        let fila = tabla.insertRow();
        fila.insertCell(0).innerText = m.id;
        fila.insertCell(1).innerText = m.nombre;
        fila.insertCell(2).innerText = m.orden;
        fila.insertCell(3).innerHTML =
            m.estatus === "H"
            ? "<span class='badge bg-success'>Habilitado</span>"
            : "<span class='badge bg-secondary'>Deshabilitado</span>";
    });
}

// ================= LIMPIAR =================
function limpiarFormulario(){
    nombreMenu.value = "";
    orden.value = "";
    estatus.value = "H";
}
</script>
</head>

<body>

<div class="container-fluid mt-4">
<div class="row">

<!-- FORMULARIO -->
<div class="col-md-4">
<div class="card shadow mb-3">
<div class="card-header bg-primary text-white">
<h4>Menú</h4>
</div>

<div class="card-body">
<label>Nombre del menú</label>
<input id="nombreMenu" class="form-control mb-2"
placeholder="Ej. Ventas, Clientes, Reportes">

<label>Orden</label>
<input id="orden" type="number" class="form-control mb-2"
placeholder="Posición del menú">

<label>Estatus</label>
<select id="estatus" class="form-control mb-3">
<option value="H">Habilitado</option>
<option value="D">Deshabilitado</option>
</select>

<button class="btn btn-success w-100" onclick="guardarMenu()">
Guardar Menú
</button>
</div>
</div>
</div>

<!-- LISTADO -->
<div class="col-md-8">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4>Menús Registrados</h4>
</div>

<div class="card-body p-0">
<table class="table table-striped table-bordered mb-0">
<thead class="table-light">
<tr>
<th>ID</th>
<th>Menú</th>
<th>Orden</th>
<th>Estatus</th>
</tr>
</thead>
<tbody id="tablaMenus"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- AVISO LEGAL -->
<footer class="text-center mt-4 text-muted">
<small>
© 2026 – Sistema Punto de Venta desarrollado por Rodrigo.  
Configuración de menús sujeta a permisos del sistema.
</small>
</footer>

</body>
</html>
