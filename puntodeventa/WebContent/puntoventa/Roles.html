<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Roles - Punto de Venta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.card { border-radius:10px; }
input, textarea, select { font-size:1.05rem; }
</style>

<script>
// ================= ROLES (SIMULACIÓN BD) =================
let roles = [];
let idRol = 1;

// ================= GUARDAR ROL =================
function guardarRol(){
    let rol = {
        id: idRol++,
        nombre: nombreRol.value,
        descripcion: descripcion.value,
        estatus: estatus.value
    };

    roles.push(rol);
    listarRoles();
    limpiarFormulario();
}

// ================= LISTAR ROLES =================
function listarRoles(){
    let tabla = document.getElementById("tablaRoles");
    tabla.innerHTML = "";

    roles.forEach(r => {
        let fila = tabla.insertRow();
        fila.insertCell(0).innerText = r.id;
        fila.insertCell(1).innerText = r.nombre;
        fila.insertCell(2).innerText = r.descripcion;
        fila.insertCell(3).innerHTML =
            r.estatus === "H"
            ? "<span class='badge bg-success'>Habilitado</span>"
            : "<span class='badge bg-secondary'>Deshabilitado</span>";
    });
}

// ================= LIMPIAR =================
function limpiarFormulario(){
    nombreRol.value = "";
    descripcion.value = "";
    estatus.value = "H";
}
</script>
</head>

<body>

<div class="container-fluid mt-4">
<div class="row">

<!-- FORMULARIO -->
<div class="col-md-4">
<div class="card shadow mb-3">
<div class="card-header bg-primary text-white">
<h4>Rol</h4>
</div>

<div class="card-body">
<label>Nombre del rol</label>
<input id="nombreRol" class="form-control mb-2"
placeholder="Ej. ADMINISTRADOR, CAJERO">

<label>Descripción</label>
<textarea id="descripcion" class="form-control mb-2" rows="2"
placeholder="Describe el alcance del rol"></textarea>

<label>Estatus</label>
<select id="estatus" class="form-control mb-3">
<option value="H">Habilitado</option>
<option value="D">Deshabilitado</option>
</select>

<button class="btn btn-success w-100" onclick="guardarRol()">
Guardar Rol
</button>
</div>
</div>
</div>

<!-- LISTADO -->
<div class="col-md-8">
<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4>Roles Registrados</h4>
</div>

<div class="card-body p-0">
<table class="table table-striped table-bordered mb-0">
<thead class="table-light">
<tr>
<th>ID</th>
<th>Rol</th>
<th>Descripción</th>
<th>Estatus</th>
</tr>
</thead>
<tbody id="tablaRoles"></tbody>
</table>
</div>
</div>
</div>

</div>
</div>

<!-- AVISO LEGAL -->
<footer class="text-center mt-4 text-muted">
<small>
© 2026 – Sistema Punto de Venta desarrollado por Rodrigo.  
Gestión de roles y permisos del sistema.
</small>
</footer>

</body>
</html>
